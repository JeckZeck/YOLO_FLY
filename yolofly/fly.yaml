# YOLOv8 — 去掉P5层，SPPF接P4，检测P2/P3/P4三尺度
#
# 设计思路：
#   - 去掉 P5（stride=32）层：VisDrone 目标普遍小，P5感受野过大收益低
#   - SPPF 接在 P4 后：保留多尺度池化增大感受野，但在更浅的层做
#   - 新增 P2（stride=4）检测头：专攻 <8px 极小目标
#   - BiFPN 融合 P2/P3/P4：小目标精度导向
#
# 层索引（backbone 0-7，head 从 8 开始）：
#   8:p4_sppf_align  9:p3_align  10:p2_align
#   11:up(p4)  12:P3_td  13:C2f(P3_td)
#   14:up(P3)  15:P2_td  16:P2_out  ← Detect P2
#   17:down(P2)  18:P3_out  19:C2f(P3_out)  ← Detect P3
#   20:down(P3)  21:P4_out  22:C2f(P4_out)  ← Detect P4
#   23:Detect(P2,P3,P4)

nc: 80
scales:
  n: [0.33, 0.25, 1024]
  s: [0.33, 0.50, 1024]
  m: [0.67, 0.75, 768]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.25, 512]

backbone:
  - [-1, 1, Conv,         [64,  3, 2]]      # 0  P1/2
  - [-1, 1, Conv,         [128, 3, 2]]      # 1  P2/4
  - [-1, 3, C2f_DCN_DCA,  [128, True]]      # 2  ← P2 特征 (32ch@n)
  - [-1, 1, Conv,         [256, 3, 2]]      # 3  P3/8
  - [-1, 6, C2f_DCN_DCA,  [256, True]]      # 4  ← P3 特征 (64ch@n)
  - [-1, 1, Conv,         [512, 3, 2]]      # 5  P4/16
  - [-1, 6, C2f_DCN_DCA,  [512, True]]      # 6  ← P4 特征 (128ch@n)
  - [-1, 1, SPPF,         [512, 5]]         # 7  ← SPPF 接 P4（去掉P5层）(128ch@n)

head:
  # ── 通道对齐（统一到 256，n scale 实际 64ch）────────────────
  - [7, 1, Conv, [256, 1, 1]]               # 8   p4_sppf_in (128→64ch)
  - [4, 1, Conv, [256, 1, 1]]               # 9   p3_in      (64→64ch)
  - [2, 1, Conv, [256, 1, 1]]               # 10  p2_in      (32→64ch)

  # ── 下行 top-down：SPPF(P4)→P3_td→P2_td ────────────────────
  - [8,  1, nn.Upsample, [None, 2, "nearest"]]  # 11  up(p4_sppf)
  - [[11, 9],  1, BiFPNFuse, [256]]             # 12  P3_td = p3 + up(p4)
  - [-1,       1, C2f,       [256]]             # 13  P3_td 精炼

  - [13, 1, nn.Upsample, [None, 2, "nearest"]]  # 14  up(P3_td)
  - [[14, 10], 1, BiFPNFuse, [256]]             # 15  P2_td = p2 + up(P3_td)
  - [-1,       1, C2f,       [256]]             # 16  P2_out ← Detect P2/4

  # ── 上行 bottom-up：P2→P3_out→P4_out ───────────────────────
  - [16, 1, Conv, [256, 3, 2]]                  # 17  down(P2_out)
  - [[17, 13, 9], 1, BiFPNFuse, [256]]          # 18  P3_out = p3+P3_td+down(P2)
  - [-1,          1, C2f,       [256]]          # 19  P3_out 精炼 ← Detect P3/8

  - [19, 1, Conv, [256, 3, 2]]                  # 20  down(P3_out)
  - [[20, 8],     1, BiFPNFuse, [256]]          # 21  P4_out = p4_sppf+down(P3)
  - [-1,          1, C2f,       [256]]          # 22  P4_out 精炼 ← Detect P4/16

  - [[16, 19, 22], 1, Detect, [nc]]             # 23  Detect(P2/4, P3/8, P4/16)